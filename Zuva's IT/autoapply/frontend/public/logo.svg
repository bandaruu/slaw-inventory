<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="case-grad" x1="0" y1="0" x2="48" y2="48">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="50%" stop-color="#2d4a6f"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="40" y2="40">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Handle -->
  <rect x="17" y="4" width="14" height="6" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
  <rect x="19" y="6" width="10" height="3" rx="2" fill="#1a1a2e"/>
  <!-- Briefcase body -->
  <rect x="4" y="12" width="40" height="28" rx="4" fill="url(#case-grad)" stroke="#334155" stroke-width="0.5"/>
  <!-- Shine arc -->
  <path d="M 6 38 Q 20 20 42 14" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" fill="none"/>
  <!-- Circuit lines -->
  <line x1="8" y1="22" x2="22" y2="22" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="22" cy="22" r="2" fill="#38bdf8"/>
  <line x1="8" y1="27" x2="18" y2="27" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="18" cy="27" r="2" fill="#38bdf8"/>
  <line x1="8" y1="32" x2="24" y2="32" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="24" cy="32" r="2" fill="#38bdf8"/>
  <line x1="22" y1="22" x2="28" y2="18" stroke="#fff" stroke-width="1" stroke-linecap="round"/>
  <circle cx="28" cy="18" r="1.5" fill="#fff"/>
</svg>
